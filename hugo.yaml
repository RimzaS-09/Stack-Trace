baseURL : "https://rimzas-09.github.io/Stack-Trace/"
locale : "en-us"
module:
  imports:
    - path: github.com/imfing/hextra
caches:
  images:
    dir: :cacheDir/imagesS

  
params:
  footer:
    displayCopyright: false
    displayPoweredBy: false

  math:
    engine: katex
    enable: true
  
  page:
    width: 
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: favicon.svg
      link: /
      width: 40
      height: 20

canonifyURLs : true

menu:
  main:
    - name: Articles
      pageRef: /articles
      weight: 1
    - name: Blog
      pageRef: /blog
      weight: 2
    - name: About Me
      pageRef: /about
      weight: 3
    - name: GitHub
      weight: 5
      url: "https://github.com/RimzaS-09/Stack-Trace"
      params:
        icon: github

markup:
  goldmark:
    renderer:
      unsafe: true